<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Geovisor – Jardín</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
          integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
          crossorigin=""/>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet-draw/dist/leaflet.draw.css"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet-measure/dist/leaflet-measure.css"/>
    <link rel="stylesheet" href="https://unpkg.com/leaflet.control.layers.tree/L.Control.Layers.Tree.css" />
</head>
<!-- Toast notificación Street View -->
<div id="svToast"></div>
<body>

    <!-- HEADER -->
    <header id="appHeader">
        <div id="headerBrand">
            <svg width="28" height="28" viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg">
                <polygon points="14,2 26,8 26,20 14,26 2,20 2,8" stroke="#5cefb0" stroke-width="1.5" fill="none"/>
                <circle cx="14" cy="14" r="4" fill="#5cefb0"/>
                <line x1="14" y1="2" x2="14" y2="10" stroke="#5cefb0" stroke-width="1"/>
                <line x1="14" y1="18" x2="14" y2="26" stroke="#5cefb0" stroke-width="1"/>
                <line x1="2" y1="8" x2="9" y2="12" stroke="#5cefb0" stroke-width="1"/>
                <line x1="19" y1="16" x2="26" y2="20" stroke="#5cefb0" stroke-width="1"/>
                <line x1="26" y1="8" x2="19" y2="12" stroke="#5cefb0" stroke-width="1"/>
                <line x1="9" y1="16" x2="2" y2="20" stroke="#5cefb0" stroke-width="1"/>
            </svg>
            <span class="brand-title">GEOVISOR</span>
            <span class="brand-sub">// Jardín, Antioquia</span>
        </div>
        <div id="headerMeta">
            <span class="header-tag">SIG Municipal</span>
            <span class="header-tag">v2.0</span>
        </div>
    </header>

    <div id="app">
        <div id="map"></div>
        <div id="resizeBar"><div class="resize-grip"></div></div>

        <div id="panelInferior">

            <!-- PANEL CONSULTA -->
            <div id="panelConsulta" class="panel-botones">
                <div class="panel-botones-header">
                    <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><circle cx="7" cy="7" r="6" stroke="currentColor" stroke-width="1.5"/><path d="M4.5 7h5M7 4.5v5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
                    Capas a consultar
                </div>
                <div class="panel-botones-body">
                    <label class="field-label" for="selectorCapa">Capa activa</label>
                    <div class="select-wrapper">
                        <select id="selectorCapa"></select>
                        <svg class="select-arrow" width="12" height="12" viewBox="0 0 12 12"><path d="M2 4l4 4 4-4" stroke="currentColor" stroke-width="1.5" fill="none" stroke-linecap="round"/></svg>
                    </div>

                    <div class="btn-group">
                        <button class="btn-panel" onclick="toggleDashboard()">
                            <svg width="15" height="15" viewBox="0 0 15 15" fill="none">
                                <rect x="1" y="1" width="5.5" height="5.5" rx="1" stroke="currentColor" stroke-width="1.3"/>
                                <rect x="8.5" y="1" width="5.5" height="5.5" rx="1" stroke="currentColor" stroke-width="1.3"/>
                                <rect x="1" y="8.5" width="5.5" height="5.5" rx="1" stroke="currentColor" stroke-width="1.3"/>
                                <rect x="8.5" y="8.5" width="5.5" height="5.5" rx="1" stroke="currentColor" stroke-width="1.3"/>
                            </svg>
                            Dashboard
                        </button>
                        <button class="btn-panel" onclick="toggleTabla()">
                            <svg width="15" height="15" viewBox="0 0 15 15" fill="none">
                                <rect x="1" y="1" width="13" height="13" rx="1.5" stroke="currentColor" stroke-width="1.3"/>
                                <line x1="1" y1="5" x2="14" y2="5" stroke="currentColor" stroke-width="1.3"/>
                                <line x1="5.5" y1="5" x2="5.5" y2="14" stroke="currentColor" stroke-width="1.3"/>
                                <line x1="1" y1="9" x2="14" y2="9" stroke="currentColor" stroke-width="1.3"/>
                            </svg>
                            Atributos
                        </button>
                    </div>
                </div>
            </div>

            <!-- DASHBOARD -->
            <div id="dashboard" class="panel-info" style="display:none;">
                <div class="panel-header">
                    <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
                        <rect x="1" y="6" width="3" height="7" rx="0.8" fill="currentColor"/>
                        <rect x="5.5" y="3" width="3" height="10" rx="0.8" fill="currentColor"/>
                        <rect x="10" y="1" width="3" height="12" rx="0.8" fill="currentColor"/>
                    </svg>
                    Dashboard
                    <button class="panel-close" onclick="document.getElementById('dashboard').style.display='none'">✕</button>
                </div>
                <div class="panel-body" id="dashboardContenido"></div>
                <div class="resize-handle"></div>
            </div>

            <!-- TABLA ATRIBUTOS -->
            <div id="tablaAtributos" class="panel-info" style="display:none;">
                <div class="panel-header">
                    <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
                        <rect x="1" y="1" width="12" height="12" rx="1.5" stroke="currentColor" stroke-width="1.3"/>
                        <line x1="1" y1="4.5" x2="13" y2="4.5" stroke="currentColor" stroke-width="1.3"/>
                        <line x1="5" y1="4.5" x2="5" y2="13" stroke="currentColor" stroke-width="1.3"/>
                        <line x1="1" y1="8" x2="13" y2="8" stroke="currentColor" stroke-width="1.3"/>
                    </svg>
                    Tabla de Atributos
                    <button class="panel-close" onclick="document.getElementById('tablaAtributos').style.display='none'">✕</button>
                </div>
                <div class="panel-body" id="tablaContenido"></div>
                <div class="resize-handle"></div>
            </div>

        <!-- PANEL STREET VIEW -->
<div id="panelStreetView" style="display:none;">
    <div class="panel-header" id="svHeader">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
            <circle cx="7" cy="4.5" r="2.5" stroke="currentColor" stroke-width="1.4"/>
            <path d="M2 12.5c0-2.761 2.239-4.5 5-4.5s5 1.739 5 4.5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
            <path d="M10 5.5l2.5 1.2-2.5 1.2" stroke="currentColor" stroke-width="1.1" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        Street View
        <button class="panel-close" onclick="desactivarStreetView()">✕</button>
    </div>
    <div id="svMeta">
        <div id="svMetaCoordenadas">
            <svg width="11" height="11" viewBox="0 0 11 11" fill="none">
                <circle cx="5.5" cy="4" r="2" stroke="currentColor" stroke-width="1.2"/>
                <path d="M5.5 1v1M5.5 7v1M1 4h1M9 4h1" stroke="currentColor" stroke-width="1.1" stroke-linecap="round"/>
            </svg>
            <span id="svCoordenadas">–</span>
        </div>
        <div id="svMetaDireccion">
            <span id="svDireccion">–</span>
        </div>
    </div>
    <div id="svVisor">
        <div class="sv-vacio">Activa el modo Street View y haz clic en el mapa.</div>
    </div>
</div>
</div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
            integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
            crossorigin=""></script>
    <script src="https://unpkg.com/leaflet-draw/dist/leaflet.draw.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/leaflet-measure/dist/leaflet-measure.js"></script>
    <script src="https://unpkg.com/leaflet.control.layers.tree/L.Control.Layers.Tree.js"></script>
    <script src="scripts.js"></script>

</body>
</html>
